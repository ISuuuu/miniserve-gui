name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true
        default: "v0.1.0"
        type: string

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync version to manifests
        shell: bash
        run: |
          # 提取版本号（去掉前面的 v）
          RAW_V="${{ github.event.inputs.version || github.ref_name }}"
          V=${RAW_V#v}
          echo "Syncing version: $V"

          # 1. 更新 package.json (仅匹配第一个 version 字段)
          if [ -f package.json ]; then
            sed -i "0,/\"version\": \".*\"/s//\"version\": \"$V\"/" package.json
          fi

          # 2. 更新 tauri.conf.json
          if [ -f src-tauri/tauri.conf.json ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"$V\"/g" src-tauri/tauri.conf.json
          fi

          # 3. 更新 Cargo.toml (仅匹配 [package] 下的第一个 version)
          if [ -f src-tauri/Cargo.toml ]; then
            sed -i "0,/^version = .*/s//version = \"$V\"/" src-tauri/Cargo.toml
          fi

      - name: Install dependencies (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "miniserve-gui ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create CHANGELOG if not exists
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo -e "# Changelog\n\nAll notable changes to this project will be documented in this file." > CHANGELOG.md
          fi

      - name: Get version
        id: get_v
        run: echo "VERSION=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        run: |
          V_TAG="${{ steps.get_v.outputs.VERSION }}"
          if ! grep -q "## $V_TAG" CHANGELOG.md; then
            # 在首行标题后插入新版本记录
            sed -i "2i\\\n## $V_TAG\n\n- Release $V_TAG\n" CHANGELOG.md
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update changelog for ${{ steps.get_v.outputs.VERSION }}"
            git push origin HEAD:main
          fi