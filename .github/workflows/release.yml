name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true
        default: "v0.1.0"
        type: string

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for version sync)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm (for version sync)
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Sync tag/version to manifests
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          node -e "
          const fs = require('fs');
          let v = process.env.VERSION || '';
          if (v.startsWith('v')) v = v.slice(1);
          if (!v) { console.log('No version provided, skipping sync'); process.exit(0); }
          // package.json
          try {
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = v;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated package.json to', v);
          } catch (e) { console.error('package.json update failed', e); }
          // src-tauri/Cargo.toml
          try {
            const cargoPath = 'src-tauri/Cargo.toml';
            let cargo = fs.readFileSync(cargoPath, 'utf8');
            cargo = cargo.replace(/^version\s*=\s*\".*\"/m, `version = \"${v}\"`);
            fs.writeFileSync(cargoPath, cargo);
            console.log('Updated Cargo.toml to', v);
          } catch (e) { console.error('Cargo.toml update failed', e); }
          // src-tauri/tauri.conf.json
          try {
            const tauriPath = 'src-tauri/tauri.conf.json';
            const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
            tauri.version = v;
            fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
            console.log('Updated tauri.conf.json to', v);
          } catch (e) { console.error('tauri.conf.json update failed', e); }
          "

      - name: Install dependencies (Linux x86_64)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "miniserve-gui ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CHANGELOG if not exists
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo -e "# Changelog\n\nAll notable changes to this project will be documented in this file." > CHANGELOG.md
          fi

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        run: |
          if grep -q "## ${{ steps.get_version.outputs.VERSION }}" CHANGELOG.md; then
            echo "Version already in CHANGELOG"
          else
            sed -i "1a\\n## ${{ steps.get_version.outputs.VERSION }}\n\n- Release ${{ steps.get_version.outputs.VERSION }}\n" CHANGELOG.md
          fi