name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true
        default: "v0.1.0"
        type: string
      body:
        description: "Release notes / 更新说明 (留空则自动根据 Commit 生成)"
        required: false
        type: string

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync version to manifests
        shell: bash
        run: |
          # 提取版本号（去掉前面的 v）
          RAW_V="${{ github.event.inputs.version || github.ref_name }}"
          V=${RAW_V#v}
          echo "Syncing version: $V"

          # 1. 更新 package.json (仅匹配第一个 version 字段)
          if [ -f package.json ]; then
            sed -i "0,/\"version\": \".*\"/s//\"version\": \"$V\"/" package.json
          fi

          # 2. 更新 tauri.conf.json
          if [ -f src-tauri/tauri.conf.json ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"$V\"/g" src-tauri/tauri.conf.json
          fi

          # 3. 更新 Cargo.toml (仅匹配 [package] 下的第一个 version)
          if [ -f src-tauri/Cargo.toml ]; then
            sed -i "0,/^version = .*/s//version = \"$V\"/" src-tauri/Cargo.toml
          fi

      - name: Install dependencies (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Check Signing Secret
        shell: bash
        env:
          SIGN_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGN_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is empty or missing!"
            exit 1
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is present."
            echo "Key starts with: ${SIGN_KEY:0:30}..."
          fi

      - name: Build Tauri app
        id: build
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "miniserve-gui ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: ${{ github.event.inputs.body }}
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true

      - name: Debug - Check build artifacts
        if: always()
        shell: bash
        run: |
          echo "=== Checking for signature files ==="
          find . -name "*.sig" -o -name "*.sig.zip" 2>/dev/null || echo "No .sig files found"
          echo ""
          echo "=== Checking for updater json ==="
          find . -name "*.json" -path "*/bundle/*" 2>/dev/null || echo "No json in bundle"
          echo ""
          echo "=== Checking target/release/bundle ==="
          ls -la target/release/bundle/ 2>/dev/null || echo "No bundle directory"
          echo ""
          echo "=== All files in target directory ==="
          find target -name "*.json" -o -name "*.sig" 2>/dev/null | head -50
          echo ""
          echo "=== tauri.conf.json pubkey ==="
          cat src-tauri/tauri.conf.json | grep -A2 pubkey
