name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true
        default: "v0.1.0"
        type: string
      body:
        description: "Release notes / 更新说明 (留空则自动根据 Commit 生成)"
        required: false
        type: string

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync version to manifests
        shell: bash
        run: |
          # 提取版本号（去掉前面的 v）
          RAW_V="${{ github.event.inputs.version || github.ref_name }}"
          V=${RAW_V#v}
          echo "Syncing version: $V"

          # 1. 更新 package.json (仅匹配第一个 version 字段)
          if [ -f package.json ]; then
            sed -i "0,/\"version\": \".*\"/s//\"version\": \"$V\"/" package.json
          fi

          # 2. 更新 tauri.conf.json
          if [ -f src-tauri/tauri.conf.json ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"$V\"/g" src-tauri/tauri.conf.json
          fi

          # 3. 更新 Cargo.toml (仅匹配 [package] 下的第一个 version)
          if [ -f src-tauri/Cargo.toml ]; then
            sed -i "0,/^version = .*/s//version = \"$V\"/" src-tauri/Cargo.toml
          fi

      - name: Install dependencies (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Check Signing Secret
        shell: bash
        env:
          SIGN_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGN_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is empty or missing!"
            exit 1
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is present."
            echo "Key starts with: ${SIGN_KEY:0:30}..."
          fi

      - name: Build Tauri app
        id: build
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "miniserve-gui ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: ${{ github.event.inputs.body }}
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true

      - name: Upload Signatures Manually (Fallback)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          echo "Uploading signature files..."
          for sig in src-tauri/target/release/bundle/*/*.sig; do
            [ -e "$sig" ] || continue
            gh release upload "$TAG" "$sig" --clobber
          done

      - name: Debug - Check signing env
        if: always()
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          echo "=== TAURI_SIGNING_PRIVATE_KEY status ==="
          if [ -z "$KEY" ]; then
            echo "EMPTY or NOT SET"
          else
            echo "SET - starts with: ${KEY:0:50}"
          fi
          echo ""
          echo "=== tauri.conf.json pubkey ==="
          grep pubkey src-tauri/tauri.conf.json || echo "No pubkey"
          echo ""
          echo "=== Build artifacts ==="
          ls -la src-tauri/target/release/bundle/nsis/ 2>/dev/null || echo "No nsis dir"
          ls -la src-tauri/target/release/bundle/wix/ 2>/dev/null || echo "No wix dir"

  publish-updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          # 下载所有 build 阶段已上传的 .sig 签名文件
          gh release download "$TAG" -p "*.sig" -R "${{ github.repository }}" || true
          
          # 初始化 latest.json
          echo "{" > latest.json
          echo "  \"version\": \"$TAG\"," >> latest.json
          echo "  \"notes\": \"Update to $TAG\"," >> latest.json
          echo "  \"pub_date\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"," >> latest.json
          echo "  \"platforms\": {" >> latest.json
          
          first=true
          for sig_file in *.sig; do
            if [ "$sig_file" = "*.sig" ]; then break; fi
            
            sig_content=$(cat "$sig_file")
            file_name="${sig_file%.sig}"
            
            platform=""
            if [[ "$file_name" == *"-setup.exe" ]]; then
              platform="windows-x86_64"
            elif [[ "$file_name" == *".AppImage.tar.gz" ]] || [[ "$file_name" == *"amd64.AppImage.tar.gz" ]]; then
              platform="linux-x86_64"
            else
               continue
            fi
            
            url="https://github.com/${{ github.repository }}/releases/download/$TAG/$file_name"
            
            if [ "$first" = true ]; then
              first=false
            else
              echo "    ," >> latest.json
            fi
            
            echo "    \"$platform\": {" >> latest.json
            echo "      \"signature\": \"$sig_content\"," >> latest.json
            echo "      \"url\": \"$url\"" >> latest.json
            echo "    }" >> latest.json
          done
          
          echo "  }" >> latest.json
          echo "}" >> latest.json
          
          echo "Generated latest.json:"
          cat latest.json
          
          # 统一覆盖上传最终版 latest.json
          gh release upload "$TAG" latest.json --clobber -R "${{ github.repository }}"
