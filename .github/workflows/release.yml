name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true
        default: "v0.1.0"
        type: string

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Sync tag/version to manifests (safe)
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          node -e "(async ()=>{\n            const fs = require('fs');\n            try {\n              let v = process.env.VERSION || '';\n              if (v.startsWith('v')) v = v.slice(1);\n              // 简单的校验：如果不是数字开头，说明获取到的可能是分支名（如 main），跳过同步\n              if (!/^\d/.test(v)) { console.log('Invalid version format (maybe a branch name), skipping sync:', v); return; }\n\n              // package.json\n              try {\n                const pkgPath = 'package.json';\n                const pkg = JSON.parse(fs.readFileSync(pkgPath,'utf8'));\n                pkg.version = v;\n                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\\n', 'utf8');\n                console.log('Updated package.json to', v);\n              } catch (e) { console.warn('package.json not found or update failed'); }\n\n              // src-tauri/Cargo.toml\n              try {\n                const cargoPath = 'src-tauri/Cargo.toml';\n                let cargo = fs.readFileSync(cargoPath, 'utf8');\n                const pkgSectionRegex = /(\\[package\\][\\s\\S]*?)(^\\[|$)/m;\n                const m = cargo.match(pkgSectionRegex);\n                if (m) {\n                  const pkgSection = m[1];\n                  const newPkgSection = pkgSection.replace(/(^version\\s*=\\s*)\\\"[^\\\"]*\\\"/m, \`\$1\\\"\${v}\\\"\`);\n                  cargo = cargo.replace(pkgSection, newPkgSection);\n                  fs.writeFileSync(cargoPath, cargo, 'utf8');\n                  console.log('Updated Cargo.toml package.version to', v);\n                }\n              } catch (e) { console.warn('Cargo.toml not found or update failed'); }\n\n              // src-tauri/tauri.conf.json\n              try {\n                const tauriPath = 'src-tauri/tauri.conf.json';\n                const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));\n                tauri.version = v;\n                fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\\n', 'utf8');\n                console.log('Updated tauri.conf.json to', v);\n              } catch (e) { console.warn('tauri.conf.json not found or update failed'); }\n\n            } catch(e){ console.error('Sync failed', e); process.exit(1);} \n          })();"

      - name: Install dependencies (Linux x86_64)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "miniserve-gui ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create CHANGELOG if not exists
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo -e "# Changelog\n\nAll notable changes to this project will be documented in this file." > CHANGELOG.md
          fi

      - name: Get version
        id: get_version
        run: |
          V="${{ github.event.inputs.version || github.ref_name }}"
          echo "VERSION=$V" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          if grep -q "## $VERSION" CHANGELOG.md; then
            echo "Version already in CHANGELOG"
          else
            # 在第一行标题后插入新版本记录
            sed -i "2i\\\n## $VERSION\n\n- Release $VERSION\n" CHANGELOG.md
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # 只有在文件有变动时才提交，避免报错
          if ! git diff --cached --quiet; then
            git commit -m "chore: update changelog for ${{ steps.get_version.outputs.VERSION }}"
            git push origin main
          fi